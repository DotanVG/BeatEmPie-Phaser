<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="BeatEmPie — a 2D web arcade beat 'em up where Shushki fights waves of fish and whales by dropping magical pies from the sky."
    />
    <title>BeatEmPie 🥧</title>
    <style>
      :root {
        color-scheme: dark;
        --app-width: 100vw;
        /* dvh tracks the URL-bar-adjusted mobile viewport; vh is the static fallback. */
        --app-height: 100vh;
        --app-height: 100dvh;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        /* inset:0 pins the shell to the whole window so the navy background always covers the
           full viewport - no uncovered strip (the mobile "grey bar") can ever show through. */
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
      }
      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        inset: 0;
        width: 100%;
        height: 100%;
      }
      /* NONE-scale canvas stretched edge-to-edge over the navy shell (full-bleed, like desktop).
         The vars default to the full viewport and are kept pixel-exact by the orientation gate. */
      #game-root canvas {
        display: block;
        width: var(--app-width) !important;
        height: var(--app-height) !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #boot-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe08a;
        font-size: 1.5rem;
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 10;
      }
      #fullscreen-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        right: calc(env(safe-area-inset-right, 0px) + 18px);
        width: 58px;
        height: 58px;
        border: 0;
        border-radius: 50%;
        background: rgba(11, 13, 43, 0.42);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        z-index: 9000;
        transition: transform 160ms ease, background 160ms ease;
      }
      #fullscreen-btn:hover {
        background: rgba(58, 43, 107, 0.62);
        transform: scale(1.06);
      }
      #fullscreen-btn:active {
        transform: scale(0.96);
      }
      #fullscreen-btn .fs-corner {
        position: absolute;
        width: 14px;
        height: 14px;
        border-color: #ffe08a;
        border-style: solid;
        transition: transform 180ms ease;
      }
      #fullscreen-btn .tl {
        top: 14px;
        left: 14px;
        border-width: 3px 0 0 3px;
      }
      #fullscreen-btn .tr {
        top: 14px;
        right: 14px;
        border-width: 3px 3px 0 0;
      }
      #fullscreen-btn .bl {
        bottom: 14px;
        left: 14px;
        border-width: 0 0 3px 3px;
      }
      #fullscreen-btn .br {
        right: 14px;
        bottom: 14px;
        border-width: 0 3px 3px 0;
      }
      #fullscreen-btn[data-active='true'] .tl {
        transform: translate(5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .tr {
        transform: translate(-5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .bl {
        transform: translate(5px, -5px);
      }
      #fullscreen-btn[data-active='true'] .br {
        transform: translate(-5px, -5px);
      }

      /* ------------------------------------------------------------------ *
         Rotate gate — fullscreen "turn your phone to landscape" overlay.
         Visibility is driven entirely by the html[data-rotate-gate] attr
         (set by orientation.ts) with a media-query fallback, so it still
         works if the JS coordination layer never runs.
       * ------------------------------------------------------------------ */
      #rotate-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        /* Dark, near-opaque backdrop with a soft violet glow behind the icon. */
        background:
          radial-gradient(circle at 50% 40%, rgba(58, 43, 107, 0.55), transparent 62%),
          rgba(7, 9, 30, 0.97);
        -webkit-backdrop-filter: blur(5px);
        backdrop-filter: blur(5px);
        color: #ffe08a;
        text-align: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      html[data-rotate-gate='active'] #rotate-gate {
        display: flex;
      }
      html[data-rotate-gate='inactive'] #rotate-gate {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        html:not([data-rotate-gate='inactive']) #rotate-gate {
          display: flex;
        }
      }
      #rotate-gate .rotate-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #rotate-gate .rotate-icon {
        width: clamp(140px, 44vw, 200px);
        height: clamp(140px, 44vw, 200px);
        overflow: visible;
      }
      /* The phone is the animated node — kept as `.phone` so the JS restart
         helper (and unit tests) keep matching it. We animate via CSS keyframes
         (not SMIL): CSS animations reliably (re)start when the gate flips from
         `display:none` to `display:flex`, whereas an SVG's SMIL clock never
         begins ticking when the SVG is parsed inside a hidden container.
         `transform-box: fill-box; transform-origin: center` pins the rotation
         to the group's own bounding-box centre, which is honoured on mobile
         Safari (16+) and Chrome — unlike `view-box` + pixel origins, which
         silently froze on iOS. */
      #rotate-gate .phone {
        transform-box: fill-box;
        transform-origin: center;
        animation: phone-tilt 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        will-change: transform;
      }
      #rotate-gate .rotate-arc {
        animation: arc-pulse 3s ease-in-out infinite;
        will-change: opacity;
      }
      /* Portrait (0deg) -> landscape (90deg), hold, then ease back — a seamless
         rock that demonstrates the gesture the player needs to make. */
      @keyframes phone-tilt {
        0%, 12% {
          transform: rotate(0deg);
        }
        45%, 72% {
          transform: rotate(90deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      /* The rotation arrow brightens as the phone turns, fades while it holds. */
      @keyframes arc-pulse {
        0%, 12% {
          opacity: 0.2;
        }
        40%, 55% {
          opacity: 0.95;
        }
        80%, 100% {
          opacity: 0.2;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #rotate-gate .phone {
          animation: none;
          transform: rotate(90deg);
        }
        #rotate-gate .rotate-arc {
          animation: none;
          opacity: 0.55;
        }
      }
      #rotate-gate .rotate-msg {
        font-size: clamp(1.3rem, 6vw, 1.7rem);
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      #rotate-gate .rotate-sub {
        font-size: clamp(0.85rem, 3.6vw, 1rem);
        color: #fff4d6;
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-loader">Heating the ovens… 🥧</div>
    </div>
    <button id="fullscreen-btn" type="button" aria-label="Enter fullscreen" title="Enter fullscreen" hidden>
      <span class="fs-corner tl" aria-hidden="true"></span>
      <span class="fs-corner tr" aria-hidden="true"></span>
      <span class="fs-corner bl" aria-hidden="true"></span>
      <span class="fs-corner br" aria-hidden="true"></span>
    </button>
    <div id="rotate-gate" role="alertdialog" aria-label="Rotate your device to play" aria-hidden="true">
      <div class="rotate-card">
        <svg class="rotate-icon" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Rotation arrow sweeping clockwise over the phone; brightens as
               the phone turns to landscape, then fades while it rocks back. -->
          <g class="rotate-arc" fill="none" stroke="#ffe08a" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M 60 84 A 72 72 0 0 1 160 84" stroke-width="6" />
            <path d="M 147 70 L 162 84 L 147 98" stroke-width="6" />
          </g>
          <!-- Phone — rocks portrait (0deg) -> landscape (90deg) and back on a
               continuous loop (see #rotate-gate .phone keyframes). -->
          <g class="phone">
            <rect x="78" y="48" width="64" height="124" rx="13" ry="13"
              fill="rgba(255, 224, 138, 0.08)" stroke="#ffe08a" stroke-width="6" />
            <rect x="86" y="66" width="48" height="82" rx="5" fill="rgba(255, 224, 138, 0.14)" />
            <rect x="100" y="56" width="20" height="4" rx="2" fill="#ffe08a" opacity="0.85" />
            <circle cx="110" cy="158" r="3.5" fill="#ffe08a" opacity="0.85" />
          </g>
        </svg>
        <p class="rotate-msg">Rotate your device</p>
        <p class="rotate-sub">BeatEmPie plays best in landscape 🥧</p>
      </div>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
