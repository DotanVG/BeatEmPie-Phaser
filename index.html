<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="BeatEmPie — a 2D web arcade beat 'em up where Shushki fights waves of fish and whales by dropping magical pies from the sky." />
    <title>BeatEmPie 🥧</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        width: 100dvw;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        /* Lock the page to the viewport: no rubber-band scroll / overscroll on mobile. */
        position: fixed;
        inset: 0;
        overscroll-behavior: none;
      }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100vw;
        width: 100dvw;
        min-width: 100vw;
        min-width: 100dvw;
        height: 100vh;
        /* dvh tracks the URL-bar-adjusted viewport on modern mobile; vh is the fallback. */
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        /* FIT letterbox/pillarbox bars show this color — themed to read as intentional. */
        background: #0b0d2b;
      }
      #game-root canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #boot-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe08a;
        font-size: 1.5rem;
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 10;
      }
      #fullscreen-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        right: calc(env(safe-area-inset-right, 0px) + 18px);
        width: 58px;
        height: 58px;
        border: 0;
        border-radius: 50%;
        background: rgba(11, 13, 43, 0.42);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        z-index: 9000;
        transition: transform 160ms ease, background 160ms ease;
      }
      #fullscreen-btn:hover {
        background: rgba(58, 43, 107, 0.62);
        transform: scale(1.06);
      }
      #fullscreen-btn:active {
        transform: scale(0.96);
      }
      #fullscreen-btn .fs-corner {
        position: absolute;
        width: 14px;
        height: 14px;
        border-color: #ffe08a;
        border-style: solid;
        transition: transform 180ms ease;
      }
      #fullscreen-btn .tl {
        top: 14px;
        left: 14px;
        border-width: 3px 0 0 3px;
      }
      #fullscreen-btn .tr {
        top: 14px;
        right: 14px;
        border-width: 3px 3px 0 0;
      }
      #fullscreen-btn .bl {
        bottom: 14px;
        left: 14px;
        border-width: 0 0 3px 3px;
      }
      #fullscreen-btn .br {
        right: 14px;
        bottom: 14px;
        border-width: 0 3px 3px 0;
      }
      #fullscreen-btn[data-active='true'] .tl {
        transform: translate(5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .tr {
        transform: translate(-5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .bl {
        transform: translate(5px, -5px);
      }
      #fullscreen-btn[data-active='true'] .br {
        transform: translate(-5px, -5px);
      }

      /* --- Landscape-only gate: animated "rotate your device" overlay --------- */
      /* Hidden by default; the media query below is the SOLE visibility toggle,  */
      /* so it works even if JavaScript fails to load. (pointer: coarse) keeps it */
      /* off desktop entirely — a mouse user resizing tall never sees it.         */
      #rotate-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #0b0d2b;
        color: #ffe08a;
        text-align: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-gate {
          display: flex;
        }
      }
      #rotate-gate .phone-wrap {
        position: relative;
        width: 220px;
        height: 220px;
      }
      #rotate-gate .turn-ring {
        position: absolute;
        inset: 18px;
        border-radius: 50%;
        border: 4px solid rgba(255, 224, 138, 0.26);
        border-right-color: #ffe08a;
        border-bottom-color: transparent;
        animation: turn-ring 2.2s linear infinite;
      }
      #rotate-gate .turn-ring::after {
        content: '';
        position: absolute;
        top: 14px;
        right: 18px;
        width: 16px;
        height: 16px;
        border-top: 4px solid #ffe08a;
        border-right: 4px solid #ffe08a;
        transform: rotate(28deg);
      }
      #rotate-gate .phone {
        position: relative;
        margin: 40px auto 0;
        width: 78px;
        height: 140px;
        border: 6px solid #ffe08a;
        border-radius: 16px;
        background: rgba(255, 224, 138, 0.08);
        transform-origin: center;
        animation: rotate-hint 2.2s cubic-bezier(0.55, 0.05, 0.45, 0.95) infinite;
        will-change: transform;
      }
      /* Speaker bar + home dot drawn with pseudo-elements — no image assets. */
      #rotate-gate .phone::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 26px;
        height: 5px;
        border-radius: 3px;
        background: #ffe08a;
        opacity: 0.7;
      }
      #rotate-gate .phone::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #ffe08a;
        opacity: 0.7;
      }
      #rotate-gate .rotate-msg {
        font-size: 1.5rem;
        font-weight: bold;
        letter-spacing: 0.04em;
      }
      #rotate-gate .rotate-sub {
        font-size: 1rem;
        color: #fff4d6;
        opacity: 0.75;
      }
      @keyframes rotate-hint {
        0%,
        24% {
          transform: translateY(0) rotate(0deg) scale(1);
        }
        50%,
        80% {
          transform: translateY(6px) rotate(-90deg) scale(1.04);
        }
        100% {
          transform: translateY(0) rotate(0deg) scale(1);
        }
      }
      @keyframes turn-ring {
        from {
          transform: rotate(0deg);
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
        to {
          transform: rotate(360deg);
          opacity: 0.7;
        }
      }
      /* Respect reduced-motion: hold the device in landscape, no spin. */
      @media (prefers-reduced-motion: reduce) {
        #rotate-gate .turn-ring {
          animation: none;
          transform: rotate(28deg);
        }
        #rotate-gate .phone {
          animation: none;
          transform: rotate(-90deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-loader">Heating the ovens… 🥧</div>
    </div>
    <button id="fullscreen-btn" type="button" aria-label="Enter fullscreen" title="Enter fullscreen" hidden>
      <span class="fs-corner tl" aria-hidden="true"></span>
      <span class="fs-corner tr" aria-hidden="true"></span>
      <span class="fs-corner bl" aria-hidden="true"></span>
      <span class="fs-corner br" aria-hidden="true"></span>
    </button>
    <div id="rotate-gate" aria-hidden="true">
      <div class="phone-wrap">
        <div class="turn-ring"></div>
        <div class="phone"></div>
      </div>
      <p class="rotate-msg">Rotate your device to play 🥧</p>
      <p class="rotate-sub">BeatEmPie is best in landscape</p>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
