<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="BeatEmPie — a 2D web arcade beat 'em up where Shushki fights waves of fish and whales by dropping magical pies from the sky."
    />
    <title>BeatEmPie 🥧</title>
    <style>
      :root {
        color-scheme: dark;
        --app-width: 100vw;
        /* dvh tracks the URL-bar-adjusted mobile viewport; vh is the static fallback. */
        --app-height: 100vh;
        --app-height: 100dvh;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        /* inset:0 pins the shell to the whole window so the navy background always covers the
           full viewport - no uncovered strip (the mobile "grey bar") can ever show through. */
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
      }
      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        inset: 0;
        width: 100%;
        height: 100%;
      }
      /* NONE-scale canvas stretched edge-to-edge over the navy shell (full-bleed, like desktop).
         The vars default to the full viewport and are kept pixel-exact by the orientation gate. */
      #game-root canvas {
        display: block;
        width: var(--app-width) !important;
        height: var(--app-height) !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #boot-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe08a;
        font-size: 1.5rem;
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 10;
      }
      #fullscreen-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        right: calc(env(safe-area-inset-right, 0px) + 18px);
        width: 58px;
        height: 58px;
        border: 0;
        border-radius: 50%;
        background: rgba(11, 13, 43, 0.42);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        z-index: 9000;
        transition: transform 160ms ease, background 160ms ease;
      }
      #fullscreen-btn:hover {
        background: rgba(58, 43, 107, 0.62);
        transform: scale(1.06);
      }
      #fullscreen-btn:active {
        transform: scale(0.96);
      }
      #fullscreen-btn .fs-corner {
        position: absolute;
        width: 14px;
        height: 14px;
        border-color: #ffe08a;
        border-style: solid;
        transition: transform 180ms ease;
      }
      #fullscreen-btn .tl {
        top: 14px;
        left: 14px;
        border-width: 3px 0 0 3px;
      }
      #fullscreen-btn .tr {
        top: 14px;
        right: 14px;
        border-width: 3px 3px 0 0;
      }
      #fullscreen-btn .bl {
        bottom: 14px;
        left: 14px;
        border-width: 0 0 3px 3px;
      }
      #fullscreen-btn .br {
        right: 14px;
        bottom: 14px;
        border-width: 0 3px 3px 0;
      }
      #fullscreen-btn[data-active='true'] .tl {
        transform: translate(5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .tr {
        transform: translate(-5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .bl {
        transform: translate(5px, -5px);
      }
      #fullscreen-btn[data-active='true'] .br {
        transform: translate(-5px, -5px);
      }

      /* ------------------------------------------------------------------ *
         Rotate gate — fullscreen "turn your phone to landscape" overlay.
         Visibility is driven entirely by the html[data-rotate-gate] attr
         (set by orientation.ts) with a media-query fallback, so it still
         works if the JS coordination layer never runs.
       * ------------------------------------------------------------------ */
      #rotate-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        /* Dark, near-opaque backdrop with a soft violet glow behind the icon. */
        background:
          radial-gradient(circle at 50% 40%, rgba(58, 43, 107, 0.55), transparent 62%),
          rgba(7, 9, 30, 0.97);
        -webkit-backdrop-filter: blur(5px);
        backdrop-filter: blur(5px);
        color: #ffe08a;
        text-align: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      html[data-rotate-gate='active'] #rotate-gate {
        display: flex;
      }
      html[data-rotate-gate='inactive'] #rotate-gate {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        html:not([data-rotate-gate='inactive']) #rotate-gate {
          display: flex;
        }
      }
      #rotate-gate .rotate-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      /* Stage holds the static arrow + the phone, both centred. */
      #rotate-gate .rotate-stage {
        position: relative;
        width: clamp(150px, 46vw, 210px);
        height: clamp(150px, 46vw, 210px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The arrow is a STATIC SVG — static SVG paths render correctly on iOS
         Safari; only *animated* SVG (CSS keyframes / SMIL) froze. Its glow is
         pulsed by the rAF loop below, never by the CSS animation engine. */
      #rotate-gate .rotate-arc {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        opacity: 0.4;
        will-change: opacity;
        animation: arc-pulse 3s ease-in-out infinite;
      }
      /* The phone is a plain HTML <div>, NOT an SVG group, animated by a CSS
         keyframe rotation. This is the key change from every prior (failed)
         attempt: those all froze on mobile Safari because they animated an SVG
         — `transform-box: fill-box`/`view-box` and SMIL only apply to SVG and
         each silently stalled on iOS. A regular block element has none of those
         quirks: `transform` rotates around `transform-origin` on the border-box
         the way it does everywhere, and the keyframe clock starts the moment
         the gate flips from `display:none` to `display:flex`. Kept class
         `.phone` so unit tests keep matching it. */
      #rotate-gate .phone {
        position: relative;
        width: clamp(60px, 18vw, 76px);
        height: clamp(112px, 34vw, 142px);
        border: 6px solid #ffe08a;
        border-radius: 15px;
        background: rgba(255, 224, 138, 0.08);
        transform-origin: 50% 50%;
        will-change: transform;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: phone-tilt 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      /* Portrait (0deg) -> landscape (90deg), brief hold, ease back — a seamless
         rock demonstrating the gesture. Plain-element transform: rock solid on
         iOS Safari + Chrome. */
      @keyframes phone-tilt {
        0%, 12% { transform: rotate(0deg); }
        45%, 72% { transform: rotate(90deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes arc-pulse {
        0%, 12% { opacity: 0.2; }
        40%, 55% { opacity: 0.95; }
        80%, 100% { opacity: 0.2; }
      }
      @media (prefers-reduced-motion: reduce) {
        #rotate-gate .phone { animation: none; transform: rotate(90deg); }
        #rotate-gate .rotate-arc { animation: none; opacity: 0.55; }
      }
      #rotate-gate .phone-screen {
        width: 74%;
        height: 64%;
        border-radius: 6px;
        background: rgba(255, 224, 138, 0.14);
      }
      #rotate-gate .phone-notch {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 22px;
        height: 4px;
        border-radius: 2px;
        background: #ffe08a;
        opacity: 0.85;
      }
      #rotate-gate .phone-home {
        position: absolute;
        bottom: 7px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ffe08a;
        opacity: 0.85;
      }
      #rotate-gate .rotate-msg {
        font-size: clamp(1.3rem, 6vw, 1.7rem);
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      #rotate-gate .rotate-sub {
        font-size: clamp(0.85rem, 3.6vw, 1rem);
        color: #fff4d6;
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-loader">Heating the ovens… 🥧</div>
    </div>
    <button id="fullscreen-btn" type="button" aria-label="Enter fullscreen" title="Enter fullscreen" hidden>
      <span class="fs-corner tl" aria-hidden="true"></span>
      <span class="fs-corner tr" aria-hidden="true"></span>
      <span class="fs-corner bl" aria-hidden="true"></span>
      <span class="fs-corner br" aria-hidden="true"></span>
    </button>
    <div id="rotate-gate" role="alertdialog" aria-label="Rotate your device to play" aria-hidden="true">
      <div class="rotate-card">
        <div class="rotate-stage">
          <!-- Static arrow (renders fine on iOS; only animated SVG was broken).
               Its glow is pulsed by the rAF loop, not by CSS. -->
          <svg class="rotate-arc" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g fill="none" stroke="#ffe08a" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 50 78 A 80 80 0 0 1 170 78" stroke-width="6" />
              <path d="M 156 63 L 172 78 L 156 93" stroke-width="6" />
            </g>
          </svg>
          <!-- Phone is a plain <div>, rotated each frame by the rAF loop at the
               end of <body>. Imperative transform on real DOM = bulletproof. -->
          <div class="phone" aria-hidden="true">
            <span class="phone-notch"></span>
            <span class="phone-screen"></span>
            <span class="phone-home"></span>
          </div>
        </div>
        <p class="rotate-msg">Rotate your device</p>
        <p class="rotate-sub">BeatEmPie plays best in landscape 🥧</p>
      </div>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
