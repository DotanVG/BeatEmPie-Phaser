<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="BeatEmPie — a 2D web arcade beat 'em up where Shushki fights waves of fish and whales by dropping magical pies from the sky."
    />
    <title>BeatEmPie 🥧</title>
    <style>
      :root {
        color-scheme: dark;
        --app-width: 100vw;
        /* dvh tracks the URL-bar-adjusted mobile viewport; vh is the static fallback. */
        --app-height: 100vh;
        --app-height: 100dvh;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        /* inset:0 pins the shell to the whole window so the navy background always covers the
           full viewport - no uncovered strip (the mobile "grey bar") can ever show through. */
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Subtle radial so the FIT letterbox/pillarbox gutters read as intentional, not empty. */
        background: radial-gradient(circle at 50% 42%, #14193f 0%, #0b0d2b 70%);
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #game-root {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0d2b;
      }
      #game-root:fullscreen,
      #game-root:-webkit-full-screen {
        inset: 0;
        width: 100%;
        height: 100%;
      }
      /* FIT mode: Phaser sizes and centres the canvas itself (uniform scale, aspect preserved).
         We only enforce pixel-art crispness here and let the Scale Manager own width/height. */
      #game-root canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #boot-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe08a;
        font-size: 1.5rem;
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 10;
      }
      #fullscreen-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 18px);
        right: calc(env(safe-area-inset-right, 0px) + 18px);
        width: 58px;
        height: 58px;
        border: 0;
        border-radius: 50%;
        background: rgba(11, 13, 43, 0.42);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        z-index: 9000;
        transition: transform 160ms ease, background 160ms ease;
      }
      #fullscreen-btn:hover {
        background: rgba(58, 43, 107, 0.62);
        transform: scale(1.06);
      }
      #fullscreen-btn:active {
        transform: scale(0.96);
      }
      #fullscreen-btn .fs-corner {
        position: absolute;
        width: 14px;
        height: 14px;
        border-color: #ffe08a;
        border-style: solid;
        transition: transform 180ms ease;
      }
      #fullscreen-btn .tl {
        top: 14px;
        left: 14px;
        border-width: 3px 0 0 3px;
      }
      #fullscreen-btn .tr {
        top: 14px;
        right: 14px;
        border-width: 3px 3px 0 0;
      }
      #fullscreen-btn .bl {
        bottom: 14px;
        left: 14px;
        border-width: 0 0 3px 3px;
      }
      #fullscreen-btn .br {
        right: 14px;
        bottom: 14px;
        border-width: 0 3px 3px 0;
      }
      #fullscreen-btn[data-active='true'] .tl {
        transform: translate(5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .tr {
        transform: translate(-5px, 5px);
      }
      #fullscreen-btn[data-active='true'] .bl {
        transform: translate(5px, -5px);
      }
      #fullscreen-btn[data-active='true'] .br {
        transform: translate(-5px, -5px);
      }

    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-loader">Heating the ovens… 🥧</div>
    </div>
    <button id="fullscreen-btn" type="button" aria-label="Enter fullscreen" title="Enter fullscreen" hidden>
      <span class="fs-corner tl" aria-hidden="true"></span>
      <span class="fs-corner tr" aria-hidden="true"></span>
      <span class="fs-corner bl" aria-hidden="true"></span>
      <span class="fs-corner br" aria-hidden="true"></span>
    </button>
    <script type="module" src="/src/game/main.ts"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
